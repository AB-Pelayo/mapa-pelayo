<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Semilla 25/26 | Pelayo Agronomía</title>
  <script>


</script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<style>
html,body{height:100%;margin:0;}
#map{width:100%;height:100%;}

.control{
background:white;
padding:8px;
font-size:12px;
max-height:80vh;
overflow:auto;
box-shadow:0 0 6px rgba(0,0,0,0.3);
border-radius:6px;
}
  #logoPelayo{
position:absolute;
bottom:10px;
left:10px;
z-index:1000;
}

#logoPelayo img{
height:45px;
background:white;
padding:4px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.25);
}
  #searchBox{
position:absolute;
bottom:25px;
left:120px;
z-index:1000;
background:white;
padding:6px 12px;
border-radius:8px;
font-size:14px;
box-shadow:0 2px 6px rgba(0,0,0,0.3);
}
 #modoPresentacion{
position:absolute;
top:10px;
left:60px;
z-index:1000;
}

#btnPresentacion{
background:white;
border:none;
padding:6px 10px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.3);
font-size:13px;
cursor:pointer;
} 

.legend{
background:white;
padding:8px;
border-radius:6px;
box-shadow:0 0 6px rgba(0,0,0,0.3);
}

.legend i{
width:18px;
height:18px;
float:left;
margin-right:8px;
opacity:0.8;
}

.var-color{
display:inline-block;
width:12px;
height:12px;
margin-right:6px;
}

#contadorLotes{
position:absolute;
bottom:65px;
left:10px;
background:white;
padding:6px 10px;
border-radius:8px;
font-size:14px;
z-index:1000;
box-shadow:0 2px 6px rgba(0,0,0,0.3);
}
  #loginScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
}

#loginBox{
background:white;
padding:40px;
border-radius:10px;
text-align:center;
width:380px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

#loginBox h2{
margin-top:10px;
font-size:22px;
}

#loginBox input{
width:100%;
padding:10px;
margin-top:15px;
border:1px solid #ccc;
border-radius:5px;
}

#loginBox button{
margin-top:15px;
padding:10px;
width:100%;
background:#2e7d32;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>
<!-- PANTALLA DE LOGIN -->
<div id="loginScreen">

<div id="loginBox">

<img src="logo.pelayo.png" style="width:120px;margin-bottom:20px;">

<h2>Mapa Producción de Semilla</h2>

<input type="password" id="password" placeholder="Ingrese contraseña">

<button onclick="checkLogin()">Entrar</button>

<p id="loginError"></p>

</div>

</div>

<div id="map"></div>

<div id="contadorLotes">Lotes visibles: 0</div>

  <div id="logoPelayo">
<img src="logo..pelayo.png" alt="Pelayo">
</div>
  
<div id="searchBox">
<input id="campoSearch" placeholder="Buscar campo..."
style="border:none;outline:none;width:200px;">
</div>
  
<div id="modoPresentacion">
<button id="btnPresentacion">🖥️ Presentación</button>
</div>
  
<script>

const map=L.map("map").setView([-35.3,-63.2],7);

  // BOTON GPS

const gpsControl=L.control({position:"topleft"});

gpsControl.onAdd=function(){

const div=L.DomUtil.create("div","control");

div.innerHTML='<button id="gpsBtn">📍 GPS</button>';

return div;

};

gpsControl.addTo(map);
  
const mapa=L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{attribution:"© OpenStreetMap"}
);

const satelite=L.tileLayer(
"https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
{attribution:"© Esri"}
);

mapa.addTo(map);

L.control.layers({
"Mapa":mapa,
"Satélite":satelite
}).addTo(map);

let geoLayer;

function actualizarContador(){

let count=0;

geoLayer.eachLayer(function(layer){
if(map.hasLayer(layer)){count++;}
});

document.getElementById("contadorLotes").innerText="Lotes visibles: "+count;

}

fetch("lotes.geojson")
.then(r=>r.json())
.then(data=>{

function colorVariedad(v){

const colores={
"DM38E26":"#e41a1c",
"DM40R26":"#377eb8",
"DM40E25":"#4daf4a",
"DM46R25":"#984ea3",
"DM46E25":"#ff7f00",
"DM47E23":"#ffff33",
"DM49R26":"#a65628",
"DM50E25":"#f781bf"
};

return colores[v]||"#999999";

}

function getVariedad(n){
const m=n.toUpperCase().match(/DM\d+[ER]\d+/);
return m?m[0]:"SIN";
}

function getSemilla(n){
n=n.toUpperCase();
if(n.includes("ORIG")) return "ORIGINAL";
if(n.includes("PREBAS")) return "PREBASICA";
return "OTRA";
}

function getOrigen(n){
return n.toUpperCase().includes("TERCEROS")?"TERCEROS":"PROPIOS";
}

let filtroVariedad={};
let filtroSemilla={ORIGINAL:true,PREBASICA:true};
let filtroOrigen={PROPIOS:true,TERCEROS:true};

data.features.forEach(f=>{
const v=getVariedad(f.properties.Name||"");
filtroVariedad[v]=true;
});

function refrescarMapa(){

if(geoLayer) map.removeLayer(geoLayer);

geoLayer=L.geoJSON(data,{

filter:f=>{
const n=f.properties.Name||"";
return filtroVariedad[getVariedad(n)]
&& filtroSemilla[getSemilla(n)]
&& filtroOrigen[getOrigen(n)];
},

style:f=>{
const v=getVariedad(f.properties.Name||"");
return{
color:"#333",
weight:1,
fillOpacity:0.8,
fillColor:colorVariedad(v)
};
},

onEachFeature:(f,l)=>{

const name=f.properties.Name;

try{
const ha=turf.area(f)/10000;
l.bindPopup("<b>"+name+"</b><br>"+ha.toFixed(1)+" ha");
}catch{
l.bindPopup(name);
}

}

}).addTo(map);

actualizarContador();

}

refrescarMapa();


const control=L.control({position:"topright"});

control.onAdd=function(){

const d=L.DomUtil.create("div","control");
d.id="panelFiltros";

d.innerHTML=`

<b>Semilla</b><br>
<label><input id="s1" type="checkbox" checked> Original</label><br>
<label><input id="s2" type="checkbox" checked> Prebásica</label><br><br>

<b>Origen</b><br>
<label><input id="o1" type="checkbox" checked> Propios</label><br>
<label><input id="o2" type="checkbox" checked> Terceros</label><br><br>

<b>Variedades</b>
<div id="vars"></div>

`;

return d;

};

control.addTo(map);

const cont=document.getElementById("vars");

Object.keys(filtroVariedad).sort().forEach(v=>{

cont.innerHTML+=`
<label>
<input type="checkbox" checked data-v="${v}">
<span class="var-color" style="background:${colorVariedad(v)}"></span>
${v}
</label><br>
`;

});

document.getElementById("s1").onchange=e=>{
filtroSemilla.ORIGINAL=e.target.checked;
refrescarMapa();
};

document.getElementById("s2").onchange=e=>{
filtroSemilla.PREBASICA=e.target.checked;
refrescarMapa();
};

document.getElementById("o1").onchange=e=>{
filtroOrigen.PROPIOS=e.target.checked;
refrescarMapa();
};

document.getElementById("o2").onchange=e=>{
filtroOrigen.TERCEROS=e.target.checked;
refrescarMapa();
};

cont.querySelectorAll("input").forEach(i=>{
i.onchange=()=>{
filtroVariedad[i.dataset.v]=i.checked;
refrescarMapa();
};
});
  // BUSCADOR DE CAMPOS

document.getElementById("campoSearch").addEventListener("keyup",function(){

const texto=this.value.toLowerCase();

geoLayer.eachLayer(function(layer){

const name=layer.feature.properties.Name.toLowerCase();

if(name.includes(texto)){

layer.setStyle({weight:3});

try{
map.fitBounds(layer.getBounds());
}catch{}

}else{

layer.setStyle({weight:1});

}

});

});

});
// GPS FUNCION

document.addEventListener("click",function(e){

if(e.target && e.target.id==="gpsBtn"){

map.locate({
setView:true,
maxZoom:16
});

}

});

map.on("locationfound",function(e){

L.circleMarker(e.latlng,{
radius:8,
color:"blue",
fillColor:"blue",
fillOpacity:0.9
}).addTo(map);

});

map.on("locationerror",function(){

alert("No se pudo obtener tu ubicación");

});
 // MODO PRESENTACION
let presentacion=false;

document.getElementById("btnPresentacion").onclick=function(){

presentacion=!presentacion;

const filtros=document.getElementById("panelFiltros");

if(filtros){

if(presentacion){
filtros.style.display="none";
}else{
filtros.style.display="block";
}

}

}; 
</script>
<script>

function checkLogin(){

var pass = document.getElementById("password").value;

if(pass === "pelayo2526"){

document.getElementById("loginScreen").style.display = "none";

}else{

document.getElementById("loginError").innerHTML = "Contraseña incorrecta";

}

}

document.getElementById("password").addEventListener("keydown", function(e){
if(e.key === "Enter"){checkLogin();}
});

</script>
</body>
</html>
