<script>
const map = L.map("map").setView([-35.3,-63.2],7);

function actualizarContador(){

let count = 0;

geoLayer.eachLayer(function(layer){

if(map.hasLayer(layer)){
count++;
}

});

document.getElementById("contadorLotes").innerText =
"Lotes visibles: " + count;

}

// GPS
L.control.locate({
    position:"topleft",
    flyTo:true,
    keepCurrentZoomLevel:true,
    locateOptions:{
        enableHighAccuracy:true
    },
    strings:{
        title:"Ir a mi ubicación"
    }
}).addTo(map);

// CAPAS

const mapa = L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{ attribution:"© OpenStreetMap" }
);

const satelite = L.tileLayer(
"https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
{ attribution:"© Esri" }
);

const ndvi = L.tileLayer(
"https://tiles.maps.eox.at/wms?service=WMS&request=GetMap&layers=s2cloudless_ndvi&styles=&format=image/png&transparent=true&version=1.1.1&width=256&height=256&srs=EPSG:3857&bbox={bbox-epsg-3857}",
{ attribution:"Sentinel NDVI" }
);

mapa.addTo(map);

const baseMaps = {
"Mapa": mapa,
"Satélite": satelite,
"NDVI": ndvi
};

L.control.layers(baseMaps).addTo(map);

fetch("lotes.geojson")
  .then(response => response.json())
  .then(data => {

    L.geoJSON(data, {
      onEachFeature: function(feature, layer) {
        if (feature.properties && feature.properties.Name) {
          layer.bindPopup(feature.properties.Name);
        }
      }
    }).addTo(map);

  });
// filtros
let filtroSemilla = { ORIGINAL:true, PREBASICA:false };
let filtroOrigen  = { PROPIOS:true, TERCEROS:false };
let filtroVariedad = {};

let presentation = false;

function stripZ(g) {
  if (g.type === "Polygon")
    g.coordinates = g.coordinates.map(r => r.map(c => [c[0],c[1]]));
  if (g.type === "MultiPolygon")
    g.coordinates = g.coordinates.map(p =>
      p.map(r => r.map(c => [c[0],c[1]]))
    );
  return g;
}

function getVariedad(n) {
  const m = n.toUpperCase().replace(/[^A-Z0-9]/g,"").match(/DM\d+[ER]\d+/);
  return m ? m[0] : "SIN_VARIEDAD";
}

function getSemilla(n) {
  const t = n.toUpperCase();
  if (t.includes("ORIG")) return "ORIGINAL";
  if (t.includes("PREBAS") || t.includes("PB")) return "PREBASICA";
  return "OTRA";
}

function getOrigen(n) {
  return n.trim().toUpperCase().endsWith("TERCEROS")
    ? "TERCEROS" : "PROPIOS";
}

// colores por variedad
const colores = [
"#ff00ff",
"#00ffff",
"#ff9900",
"#00ff00",
"#ff0000",
"#0099ff",
"#ffff00",
"#ff66cc",
"#66ff66"
];
const colorVar = {};
let idx = 0;

let geoLayer;

geoData.features.forEach(f => {
  f.geometry = stripZ(f.geometry);
  const v = getVariedad(f.properties?.Name || "");
  filtroVariedad[v] = true;
  if (!colorVar[v]) colorVar[v] = colores[idx++ % colores.length];
});

function refrescarMapa() {
  if (geoLayer) map.removeLayer(geoLayer);

  geoLayer = L.geoJSON(geoData, {
    filter: f => {
      const n = f.properties?.Name || "";
      return filtroSemilla[getSemilla(n)]
          && filtroOrigen[getOrigen(n)]
          && filtroVariedad[getVariedad(n)];
    },
   style: f => {

const v = getVariedad(f.properties?.Name || "");

return {
color:"#000000",
fillColor:colorVar[v],
weight:2,
fillOpacity:0.9
};

}
 }).addTo(map);
  actualizarContador();

if(!window.mapaCentrado){
map.fitBounds(geoLayer.getBounds());
window.mapaCentrado = true;
}
}

function togglePresentation() {
  presentation = !presentation;
  document.querySelector(".control").style.display =
    presentation ? "none" : "block";
}

// panel filtros
const control = L.control({position:"topright"});
control.onAdd = () => {
  const d = L.DomUtil.create("div","control");
  d.innerHTML = `
<b>Semilla</b><br>
<label><input id="s1" type="checkbox" checked> Original</label><br>
<label><input id="s2" type="checkbox"> Prebásica</label><br><br>

<b>Origen</b><br>
<label><input id="o1" type="checkbox" checked> Propios</label><br>
<label><input id="o2" type="checkbox"> Terceros</label><br><br>

<b>Variedades</b><div id="vars"></div>
`;
  return d;
};
control.addTo(map);

// construir variedades con color
const cont = document.getElementById("vars");
Object.keys(filtroVariedad).sort().forEach(v=>{
  cont.innerHTML += `<label>
    <input type="checkbox" checked data-v="${v}">
    <span class="var-color" style="background:${colorVar[v]}"></span>
    ${v}</label><br>`;
});

s1.onchange=e=>{filtroSemilla.ORIGINAL=e.target.checked;refrescarMapa();};
s2.onchange=e=>{filtroSemilla.PREBASICA=e.target.checked;refrescarMapa();};
o1.onchange=e=>{filtroOrigen.PROPIOS=e.target.checked;refrescarMapa();};
o2.onchange=e=>{filtroOrigen.TERCEROS=e.target.checked;refrescarMapa();};
cont.querySelectorAll("input").forEach(i=>{
  i.onchange=()=>{filtroVariedad[i.dataset.v]=i.checked;refrescarMapa();};
});

map.fitBounds(L.geoJSON(geoData).getBounds());
refrescarMapa();
</script>


<script>

function aplicarEventosLote(layer){
 if(layer.feature && layer.feature.properties && layer.feature.properties.Name){

  const name = layer.feature.properties.Name;
  const p = name.split("-").map(s=>s.trim());

  const tooltip = "<b>"+(p[0]||"")+"</b><br>"+(p[1]||"")+"<br>"+(p[2]||"");
  

  try{
    const ha = turf.area(layer.feature)/10000;
    layer.bindPopup("<b>"+name+"</b><br>Superficie: "+ha.toFixed(1)+" ha");
  }catch(e){}
 }
}

document.addEventListener("DOMContentLoaded", function(){

 if(typeof map !== "undefined"){

   // apply events to existing layers
   map.eachLayer(function(layer){
     if(layer.feature){
       aplicarEventosLote(layer);
     }
   });

   // apply events whenever new layers are added (filters, terceros, etc)
   map.on("layeradd", function(e){
     const layer = e.layer;
     if(layer && layer.feature){
       aplicarEventosLote(layer);
     }
   });

 }

 // search
 const input = document.getElementById("campoSearch");
 if(input){

   input.addEventListener("keyup", function(){

     const q = this.value.toLowerCase();
     const matches = [];

     if(typeof map !== "undefined"){

       map.eachLayer(function(layer){

         if(layer.feature && layer.feature.properties && layer.feature.properties.Name){

           const name = layer.feature.properties.Name.toLowerCase();

           if(layer._path){

             if(q.length>0 && name.includes(q)){
               layer._path.style.opacity = 1;
               matches.push(layer);
             }else{
               layer._path.style.opacity = q.length>0 ? 0.25 : 1;
             }

           }

         }

       });

       if(matches.length>0){
         const group = L.featureGroup(matches);
         map.fitBounds(group.getBounds(),{padding:[40,40]});
       }

     }

   });

 }

});
</script>


<script>

 });

 const satellite=L.tileLayer(
 "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
 {attribution:"Tiles © Esri"}
 );

 const ndvi=L.tileLayer.wms(
 "https://tiles.maps.eox.at/wms",
 {layers:"s2cloudless_ndvi",styles:"ndvi",format:"image/png",transparent:true,attribution:"Sentinel‑2 NDVI"}
 );

 if(baseLayer){
   L.control.layers({"Mapa":baseLayer,"Satélite":satellite,"NDVI":ndvi},{}).addTo(map);
 }

 function toggleNDVI(active){
   map.eachLayer(function(layer){
     if(layer.feature && layer.setStyle){
       if(active){ layer.setStyle({fillOpacity:0,weight:2}); }
       else{ layer.setStyle({fillOpacity:0.7,weight:1}); }
     }
   });
 }

 ndvi.on("add",()=>toggleNDVI(true));
 ndvi.on("remove",()=>toggleNDVI(false));

}
